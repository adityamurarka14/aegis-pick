name: Refresh Matchup Data

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pipeline deps
        run: pip install --upgrade pip && pip install -r pipeline/requirements.txt

      - name: Run training pipeline
        run: python pipeline/train.py
        env:
          OPENDOTA_API_KEY: ${{ secrets.OPENDOTA_API_KEY }}

      - name: Commit updated data
        run: |
          git config user.name  "Aegis Pick Bot"
          git config user.email "bot@aegis-pick.app"
          git add data/
          git diff --staged --quiet || git commit -m "chore: refresh data [skip ci]"
          git push
