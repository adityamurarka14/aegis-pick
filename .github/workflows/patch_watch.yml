name: Watch for New Patch

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  patch_check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pipeline deps
        run: pip install --upgrade pip && pip install -r pipeline/requirements.txt

      - name: Check for new patch and retrain if needed
        run: python pipeline/patch_watch.py
        env:
          OPENDOTA_API_KEY: ${{ secrets.OPENDOTA_API_KEY }}

      - name: Commit if patch changed
        run: |
          git config user.name  "Aegis Pick Bot"
          git config user.email "bot@aegis-pick.app"
          git add data/
          git diff --staged --quiet || git commit -m "chore: new patch update [skip ci]"
          git push
